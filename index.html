<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Antalya Go Projesi</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wgo/2.3.1/wgo.min.js"></script>
    
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background-color: #f4f1ea; 
        }
        /* Tahtanın çerçevesi */
        #goban-container { 
            width: 500px; 
            height: 500px; 
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        #status { font-size: 20px; font-weight: bold; margin-bottom: 10px; color: #444; }
    </style>
</head>
<body>

    <h1>Antalya Go Topluluğu</h1>
    <div id="status">Kütüphane Bekleniyor...</div>

    <div id="goban-container">
        <div id="my-goban" style="width: 500px; height: 500px;"></div>
    </div>

    <script>
        // Sayfa yüklendiğinde değil, WGo kütüphanesi hazır olduğunda çalışması için bir kontrol
        function initializeGo() {
            if (typeof WGo !== "undefined") {
                console.log("WGo Başarıyla Yüklendi");
                
                var turn = WGo.B;
                var board = new WGo.Board(document.getElementById("my-goban"), {
                    width: 500,
                    size: 19
                });

                document.getElementById("status").innerText = "Sıra Siyah'ta";

                board.addEventListener("click", function(x, y) {
                    board.addObject({x: x, y: y, c: turn});
                    turn = (turn === WGo.B) ? WGo.W : WGo.B;
                    document.getElementById("status").innerText = "Sıra: " + (turn === WGo.B ? "Siyah" : "Beyaz");
                });
            } else {
                // Eğer yüklenmediyse yarım saniye sonra tekrar dene
                console.log("WGo henüz hazır değil, tekrar deneniyor...");
                setTimeout(initializeGo, 500);
            }
        }

        // Başlat
        initializeGo();
    </script>

</body>
</html>
